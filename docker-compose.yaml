services:
  db:
    image: postgres:16-alpine
    container_name: booking-api-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: booking_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
    ports:
      - "5498:5432"
    volumes:
      - booking_api_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d booking_api"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  booking_api_pgdata: